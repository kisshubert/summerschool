<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Summer School Experimental Economics Lab</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">Corvinus Summer School</p>
        <h1>Experimental Economics Lab</h1>
      </div>
      <div class="scorebox" aria-live="polite">
        <span>Your total</span>
        <strong id="totalPayoff">0</strong>
        <span>tokens</span>
      </div>
    </header>

    <main class="app-shell">
      <aside class="game-nav" aria-label="Games">
        <button class="nav-button active" data-game="dictator">
          <span class="nav-icon">D</span>
          Dictator
        </button>
        <button class="nav-button" data-game="ultimatum">
          <span class="nav-icon">U</span>
          Ultimatum
        </button>
        <button class="nav-button" data-game="public">
          <span class="nav-icon">P</span>
          Public Goods
        </button>
        <button class="nav-button" data-game="trust">
          <span class="nav-icon">T</span>
          Trust Game
        </button>
        <button class="nav-button" data-game="results">
          <span class="nav-icon">R</span>
          My Results
        </button>
      </aside>

      <section class="stage" id="stage" aria-live="polite"></section>
    </main>

    <footer class="footer">
      <span>All decisions are saved for the live class results.</span>
      <div class="footer-actions">
        <a class="ghost-link" href="admin.html">Instructor results</a>
        <button id="resetButton" class="ghost-button">Change participant</button>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
